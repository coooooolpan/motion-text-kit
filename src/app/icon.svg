<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <rect width="128" height="128" rx="28" fill="#fafafa"/>
  <rect x="10" y="10" width="108" height="108" rx="24" fill="#ffffff" stroke="rgba(0,0,0,.12)" stroke-width="2"/>
  <filter id="roughen">
    <feTurbulence baseFrequency=".075" numOctaves="2" result="noise" seed="12" type="fractalNoise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.6" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
  <g filter="url(#roughen)" fill="#202020" stroke="#202020" stroke-linecap="round" stroke-linejoin="round" stroke-width=".7" paint-order="stroke fill">
    <text x="22" y="42" rotate="-3" font-family="Comic Sans MS, Bradley Hand, Marker Felt, cursive" font-size="27" font-weight="700" letter-spacing="-1.2">motion</text>
    <text x="34" y="72" rotate="2" font-family="Comic Sans MS, Bradley Hand, Marker Felt, cursive" font-size="27" font-weight="700" letter-spacing="-.8">text</text>
    <text x="47" y="101" rotate="-2" font-family="Comic Sans MS, Bradley Hand, Marker Felt, cursive" font-size="27" font-weight="700" letter-spacing="-.3">kit</text>
  </g>
</svg>
